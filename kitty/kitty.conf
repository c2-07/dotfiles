# Soft Modern Theme for Kitty

foreground            #d6d6d6
background            #0a0a0a

cursor                #f2d5cf
cursor_text_color     #c6d0f5
selection_background  #191919
selection_foreground  #c6d0f5

# Tabs + Borders
window_border_width     1pt
active_border_color     #44ffff
active_tab_foreground   #cccccc
active_tab_background   #111111
active_tab_font_style   normal
inactive_tab_foreground #555555
inactive_tab_background #111111
inactive_tab_font_style normal
tab_bar_background      #111111
tab_bar_margin_color    #111111
tab_bar_style           fade
tab_title_template      "{tab.active_exe.lstrip('-.')}"

# Normal colors
color0  #51576d
color1  #ff7890
color2  #a6d189
color3  #eef17a
color4  #d1b4ff
color5  #f4b8e4
color6  #29ede7
color7  #a5adce

# Bright colors
color8  #626880
color9  #e67172
color10 #8ec772
color11 #d4d76d
color12 #d1b4ff
color13 #f2a4db
color14 #81c8be
color15 #b5bfe2

# Background
background_opacity 0.90
background_blur 25

# Cursor Movement Animation
cursor_shape block
cursor_shape_unfocused hollow
cursor_trail 2
cursor_trail_start_threshold 0
cursor_trail_decay 0.1 0.4
cursor_blink_interval 0

# Font Configuration
font_family      JetBrainsMono Nerd Font Regular
bold_font        JetBrainsMono Nerd Font Regular
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Italic
font_size        15

# Hides Title Bar
hide_window_decorations titlebar-only

# Removing Default Keybings
map ctrl+shift+t no_op
map ctrl+shift+r no_op
map ctrl+shift+q no_op

# Key bindings
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

map option+tab previous_tab
map cmd+shift+t launch --cwd=current

# Window Split
enabled_layouts tall:bias=50;full_size=1;mirrored=false
map ctrl+shift+\ launch --location=split

# Vim-style navigation
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
map ctrl+k neighboring_window up
map ctrl+j neighboring_window down


# Resize splits
map ctrl+shift+h resize_window narrower
map ctrl+shift+l resize_window wider
map ctrl+shift+k resize_window taller
map ctrl+shift+j resize_window shorter

# Rotate the layout
map ctrl+shift+up layout_action move_to_screen_edge top
map ctrl+shift+left layout_action move_to_screen_edge left
map ctrl+shift+right layout_action move_to_screen_edge right
map ctrl+shift+down layout_action move_to_screen_edge bottom

macos_option_as_alt yes
mouse_hide_wait	-3.0
initial_window_width 800
initial_window_height 400
window_border_width 0.5pt
shell_integration no-cursor
