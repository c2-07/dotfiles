##### CORE #####
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set -sg escape-time 0
set -s set-clipboard on

set -g pane-border-lines single

set -g history-limit 100000
set -g mouse on
set -g remain-on-exit off
set -g allow-rename off

bind S setw synchronize-panes
set -g status-position bottom
set -g status-interval 2

setw -g aggressive-resize on

##### PREFIX #####

unbind C-b
set -g prefix C-e
bind C-e send-prefix

# Session and Window Picker
bind Space choose-tree

bind r source-file ~/.tmux.conf \; display-message "reloaded"


##### INDEX #####

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


##### PANES #####
bind z resize-pane -Z

bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

bind x kill-pane

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### WINDOWS #####

bind-key -n C-t new-window
bind X kill-window


##### COPY #####

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"


##### STATUS #####

set -g status-justify left

set -g window-status-separator " "

set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

set -g message-style "bg=#313244,fg=#cdd6f4"

set -g status-left "#[fg=#a6e3a1]  #S "
set -g status-right "#[fg=#89b4fa]%H:%M  #[fg=#f9e2af]%d-%m-%Y "

set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#f38ba8,bold] #I:#W "


##### FZF #####

# Pane picker
bind -n M-p display-popup -E -h 70% -w 70% "
tmux list-panes -a -F '#S:#I.#P - #{pane_current_path}' |
fzf --reverse |
cut -d: -f1-3 |
xargs -I{} tmux select-pane -t {}
"

# Window picker
bind -n M-w display-popup -E -h 70% -w 70% "
tmux list-windows -a -F '#S:#I:#W' |
fzf --reverse |
cut -d: -f1-2 |
xargs -I{} tmux select-window -t {}
"

# Session Picker
bind -n M-s display-popup -E "
tmux list-sessions -F '#S' |
fzf |
xargs tmux switch-client -t
"

##### LAYOUTS #####

bind -n M-2 \
  new-window \; \
  split-window -h \; \
  select-layout even-horizontal \; \
  select-pane -t 1

bind -n M-3 \
  new-window \; \
  split-window -h \; \
  split-window -v \; \
  select-layout main-vertical \; \
  select-pane -t 1

bind -n M-4 \
  new-window \; \
  split-window -h \; \
  split-window -v \; \
  select-pane -L \; \
  split-window -v \; \
  select-layout tiled \; \
  select-pane -t 1



